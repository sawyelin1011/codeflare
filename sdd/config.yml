# SDD configuration for codeflare.
# Bootstrapped 2026-04-08 — Option A: visibility-only, no auto-demote.
# Read by spec-reviewer and doc-updater at the start of every run.

# Mode: interactive | auto | unleashed
#
# interactive: confirm every fix before applying. Safe for new SDD users.
# auto:        apply SAFE+RISKY fixes silently on the current branch.
#              Escalate JUDGMENT calls to the layout-resolved triage file
#              (sdd/spec/triage.md nested, sdd/.review-needed.md flat-legacy).
# unleashed:   apply everything (including JUDGMENT) on the current branch.
#              Conservative defaults preserve information without overwriting intent.
#              Walk-away autopilot - come back to per-category commits, git revert
#              any unwanted change. No PR, no branch creation.
mode: interactive

# enforce_tdd: false for codeflare.
#
# Why opt out: codeflare predates the SDD overhaul. The 151 Implemented
# REQs were authored before the `REQ-X-NNN: ...` test-name convention.
# Codeflare HAS heavy test coverage (1620 backend + 1529 frontend + 140
# E2E tests) but the tests don't reference REQ IDs. Setting this to true
# would auto-demote every Implemented REQ to Partial in a single sweep
# — which is a lie about coverage, not a reflection of reality.
#
# Instead, with enforce_tdd: false, spec-reviewer writes coverage findings
# to the layout-resolved triage file (sdd/spec/triage.md nested,
# sdd/.review-needed.md flat-legacy) under "## Coverage gaps" without
# modifying the spec. We get visibility into the gap and can backfill
# REQ-ID test names incrementally as we touch each domain, then flip this
# to true once the bulk of the bridge is built.
enforce_tdd: false

# Test discovery globs — where spec-reviewer looks for REQ ID references.
# Codeflare-specific layout: tests live in src/__tests__, host/__tests__,
# web-ui/src/__tests__, and tests/e2e for Playwright.
test_globs:
  - "src/__tests__/**/*.test.{ts,js,tsx,jsx,mjs}"
  - "src/__tests__/**/*.spec.{ts,js,tsx,jsx,mjs}"
  - "host/__tests__/**/*.test.{js,mjs}"
  - "web-ui/src/__tests__/**/*.test.{ts,tsx,jsx}"
  - "web-ui/src/__tests__/**/*.spec.{ts,tsx,jsx}"
  - "tests/e2e/**/*.spec.{ts,js}"

# Source discovery globs (optional override) — where spec-reviewer scans
# for REQ-ID references in source code. Codeflare uses the standard
# layout, so the built-in defaults (src/**, lib/**, app/**, etc.) cover
# the Worker code. host/src is the in-container Node code.
src_globs:
  - "src/**"
  - "host/src/**"
  - "web-ui/src/**"

# Forbidden content allowlist — which categories are acceptable inside REQs.
forbidden_content_allowlist:
  protocols: true        # OAuth, JWT, WebSocket, SSE, etc.
  vendors: true          # Cloudflare, Stripe, Resend, etc.
  http_codes_in_api_reqs: true  # HTTP codes when documenting an API contract REQ
  performance_numbers: true  # "p95 < 200ms", "LCP < 2.5s"
  user_facing_strings: true  # quoted text the user actually sees

# Per-REQ overrides — REQ IDs that opt out of forbidden-content checks entirely.
forbidden_content_overrides: []

# REQ length thresholds (lines) — soft warnings only, never auto-fix.
req_length:
  warn: 25
  medium: 50
  high: 100
