version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /web-ui
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /host
    target-branch: develop
    schedule:
      interval: weekly

  # Pi agent preseed - real package.json + lockfile (@gaodes/pi-graphify,
  # @gotgenes/pi-subagents, context-mode). Unlike the Claude-side context-mode
  # and graphify pins (literal version strings handled by bump-shadow-pins.yml),
  # these live in a manifest Dependabot can manage natively.
  - package-ecosystem: npm
    directory: /preseed/agents/pi
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    ignore:
      # Stay on Node LTS (even majors: 22, 24, 26, ...). Dependabot kept proposing
      # Node 25 Current (non-LTS), which should not ship to the production Container DO.
      # Revisit manually when Node 26 LTS is released.
      - dependency-name: "docker.io/library/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "public.ecr.aws/docker/library/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
