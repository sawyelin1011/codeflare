version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /web-ui
    target-branch: develop
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /host
    target-branch: develop
    schedule:
      interval: weekly

  # Pi agent preseed (@gotgenes/pi-subagents, context-mode)
  # is intentionally NOT managed by Dependabot. Although it has a real
  # package.json + lockfile, every version here is ALSO pinned as a literal
  # install spec in entrypoint.sh (the Pi settings `required` array) and baked
  # into src/lib/agent-seed.generated.ts. Dependabot only sees the manifest, so
  # it would bump the manifest while the entrypoint literal + generated seed
  # drift out of sync. The `pi-preseed` job in bump-shadow-pins.yml owns these
  # pins instead: it updates the manifest, lockfile, entrypoint.sh, the
  # agent-seed-manifest tests, and regenerates the seed in one PR.

  - package-ecosystem: docker
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
    ignore:
      # Stay on Node LTS (even majors: 22, 24, 26, ...). Dependabot kept proposing
      # Node 25 Current (non-LTS), which should not ship to the production Container DO.
      # Revisit manually when Node 26 LTS is released.
      - dependency-name: "docker.io/library/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "public.ecr.aws/docker/library/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
