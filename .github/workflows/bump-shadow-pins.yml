          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          node <<'NODE'
          const fs = require('node:fs');
          const cur = process.env.CUR;
          const lat = process.env.LAT;
          // plugin.json carries the version twice (.version + the graphifyy@X.Y.Z
          // string in .description); replaceAll covers both occurrences.
          const files = [
            'preseed/agents/claude/plugins/graphify/.claude-plugin/plugin.json',
          ];
          for (const f of files) {
            const before = fs.readFileSync(f, 'utf-8');
            const after = before.replaceAll(cur, lat);
            if (before !== after) {
              fs.writeFileSync(f, after);
              console.log(`updated ${f}`);
            }
          }
          NODE

          npm ci --no-audit --no-fund --silent
          npm run generate:agent-seed

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed (replacement found nothing) - aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump graphify $CUR -> $LAT"
          git push -u origin "${{ steps.branch.outputs.branch }}"
        env:
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          Auto-generated bump of \`graphify\` (PyPI \`graphifyy\`) from \`$CUR\` to \`$LAT\`.

          The version is shadow-pinned (no package.json entry; the Dockerfile reads it from \`plugin.json\` via jq) so Dependabot can't open this PR - \`bump-shadow-pins.yml\` does it weekly.

          Files updated by string replace + agent-seed regenerate:
          - \`preseed/agents/claude/plugins/graphify/.claude-plugin/plugin.json\` (.version + graphifyy@X.Y.Z description)
          - \`src/lib/agent-seed.generated.ts\` (regenerated)

          ## Test plan
          - [ ] CI green
          - [ ] Review the graphify CHANGELOG for the bumped range before merge
          - [ ] Smoke test on integration: \`graphify --version\` reports the new version
          EOF
          )
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump graphify $CUR -> $LAT" \
            --body "$BODY"

  zoxide:
    runs-on: ubuntu-latest
    steps:
