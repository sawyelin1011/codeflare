name: bump-shadow-pins

# Watches pinned versions that live outside any package.json
# (so Dependabot can't see them) and opens a single PR per bump.
#
# Currently watched:
# - context-mode npm package (plugin.json + entrypoint.sh + hooks.json + README.md)
# - zoxide, yazi, lazygit, silverbullet (GitHub release binaries pinned in Dockerfile)

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  context-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Diff current pin against npm latest
        id: ver
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json)
          LATEST=$(npm view context-mode version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $LATEST, nothing to do."
          else
            echo "Bumping $CURRENT -> $LATEST"
          fi

      - name: Skip if a branch for this version already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="bump/context-mode-${{ steps.ver.outputs.latest }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping (existing PR likely open)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          node <<'NODE'
          const fs = require('node:fs');
          const cur = process.env.CUR;
          const lat = process.env.LAT;
          const files = [
            'preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json',
            'preseed/agents/claude/plugins/context-mode/hooks/hooks.json',
            'preseed/agents/claude/plugins/context-mode/README.md',
          ];
          for (const f of files) {
            const before = fs.readFileSync(f, 'utf-8');
            const after = before.replaceAll(cur, lat);
            if (before !== after) {
              fs.writeFileSync(f, after);
              console.log(`updated ${f}`);
            }
          }
          // Fix entrypoint.sh fallback versions (these may have drifted from
          // the canonical plugin.json version). Regex targets the specific
          // patterns rather than a blind string replace.
          const ep = 'entrypoint.sh';
          let epContent = fs.readFileSync(ep, 'utf-8');
          const epBefore = epContent;
          epContent = epContent.replace(
            /CONTEXT_MODE_VERSION="[^"]+"/g,
            `CONTEXT_MODE_VERSION="${lat}"`
          );
          epContent = epContent.replace(
            /\.version \/\/ "[^"]+"/g,
            `.version // "${lat}"`
          );
          epContent = epContent.replace(
            /\|\| echo "[0-9]+\.[0-9]+\.[0-9]+"/g,
            `|| echo "${lat}"`
          );
          if (epContent !== epBefore) {
            fs.writeFileSync(ep, epContent);
            console.log(`updated ${ep}`);
          }
          NODE

          npm ci --no-audit --no-fund --silent
          npm run generate:agent-seed

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed (replacement found nothing) — aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump context-mode $CUR -> $LAT"
          git push -u origin "${{ steps.branch.outputs.branch }}"
        env:
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          Auto-generated bump of \`context-mode\` from \`$CUR\` to \`$LAT\`.

          The version is shadow-pinned (no package.json entry) so Dependabot can't open this PR — \`bump-shadow-pins.yml\` does it weekly.

          Files updated by string replace + agent-seed regenerate:
          - \`preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json\`
          - \`entrypoint.sh\` (CONTEXT_MODE_VERSION + jq/bash fallback strings)
          - \`preseed/agents/claude/plugins/context-mode/hooks/hooks.json\` (4 hook commands)
          - \`preseed/agents/claude/plugins/context-mode/README.md\`
          - \`src/lib/agent-seed.generated.ts\` (regenerated)

          ## Test plan
          - [ ] CI green
          - [ ] Smoke test on integration: \`ctx_doctor\` reports the new version
          EOF
          )
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump context-mode $CUR -> $LAT" \
            --body "$BODY"

  zoxide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compare Dockerfile pin against latest GitHub release
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT=$(grep -oP 'ZOXIDE_VERSION="\K[^"]+' Dockerfile)
          TAG=$(gh api repos/ajeetdsouza/zoxide/releases/latest --jq .tag_name)
          LATEST="${TAG#v}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $LATEST, nothing to do."
          else
            echo "Bumping $CURRENT -> $LATEST"
          fi

      - name: Skip if a branch for this version already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="bump/zoxide-${{ steps.ver.outputs.latest }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          node <<'NODE'
          const fs = require('node:fs');
          const lat = process.env.LAT;
          let content = fs.readFileSync('Dockerfile', 'utf-8');
          content = content.replace(/ZOXIDE_VERSION="[^"]+"/, `ZOXIDE_VERSION="${lat}"`);
          content = content.replace(/ZOXIDE_SHA256="[^"]+"/, `ZOXIDE_SHA256="NEEDS_UPDATE_SEE_PR_BODY"`);
          fs.writeFileSync('Dockerfile', content);
          NODE

          git add Dockerfile
          if git diff --cached --quiet; then
            echo "Nothing changed — aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump zoxide $CUR -> $LAT"
          git push -u origin "${{ steps.branch.outputs.branch }}"
        env:
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}
        run: |
          set -euo pipefail
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump zoxide $CUR -> $LAT" \
            --body "$(cat <<EOF
          Auto-generated bump of \`zoxide\` from \`$CUR\` to \`$LAT\`.

          The version is pinned in \`Dockerfile\` with a SHA256 checksum — Dependabot can't see it, so \`bump-shadow-pins.yml\` opens this PR weekly.

          **Action required before merge:** Update the SHA256 checksum in Dockerfile:
          \`\`\`bash
          curl -fsSL "https://github.com/ajeetdsouza/zoxide/releases/download/v${LAT}/zoxide-${LAT}-x86_64-unknown-linux-musl.tar.gz" | sha256sum
          \`\`\`

          ## Test plan
          - [ ] Update \`ZOXIDE_SHA256\` in Dockerfile
          - [ ] CI green (Docker build verifies checksum)
          EOF
          )"

