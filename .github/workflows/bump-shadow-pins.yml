name: Bump Shadow Pins

# Watches pinned versions that live outside any package.json
# (so Dependabot can't see them) and opens a single PR per bump.
#
# Currently watched:
# - context-mode npm package (plugin.json + entrypoint.sh + README.md)
# - graphify PyPI package graphifyy (plugin.json; Dockerfile reads the pin via jq,
#   so no Dockerfile literal to bump)
# - zoxide, yazi, lazygit, silverbullet (GitHub release binaries pinned in Dockerfile)
# - consult-llm-mcp npm package (pinned `npm install -g` literal in Dockerfile)
# - browser-run-mcp: @modelcontextprotocol/sdk pin in
#   preseed/agents/claude/browser-run-mcp/package.json (baked into the image; no
#   Dockerfile literal — the job reads/bumps the package.json pin via jq)
# - pi-preseed: EVERY dependency in preseed/agents/pi/package.json (the @juicesharp
#   rpiv family, pi-web-access, pi-mcp-adapter, @gotgenes/pi-subagents, context-mode)
#   — each is also a literal install spec in entrypoint.sh + baked into the seed
#
# NOT watched (deliberate): bun is pinned in the Dockerfile but bumped MANUALLY
# after smoke-testing (context-mode autodetects Bun at runtime, so a breaking Bun
# release silently regresses ctx_execute) — see the Dockerfile bun comment.

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  context-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Diff current pin against npm latest
        id: ver
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json)
          LATEST=$(npm view context-mode version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $LATEST, nothing to do."
          else
            echo "Bumping $CURRENT -> $LATEST"
          fi

      - name: Skip if a branch for this version already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="bump/context-mode-${{ steps.ver.outputs.latest }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping (existing PR likely open)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          node <<'NODE'
          const fs = require('node:fs');
          const cur = process.env.CUR;
          const lat = process.env.LAT;
          const files = [
            'preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json',
            'preseed/agents/claude/plugins/context-mode/README.md',
          ];
          for (const f of files) {
            const before = fs.readFileSync(f, 'utf-8');
            const after = before.replaceAll(cur, lat);
            if (before !== after) {
              fs.writeFileSync(f, after);
              console.log(`updated ${f}`);
            }
          }
          // Fix entrypoint.sh fallback versions (these may have drifted from
          // the canonical plugin.json version). Regex targets the specific
          // patterns rather than a blind string replace.
          const ep = 'entrypoint.sh';
          let epContent = fs.readFileSync(ep, 'utf-8');
          const epBefore = epContent;
          epContent = epContent.replace(
            /CONTEXT_MODE_VERSION="[^"]+"/g,
            `CONTEXT_MODE_VERSION="${lat}"`
          );
          epContent = epContent.replace(
            /\.version \/\/ "[^"]+"' "\$CONTEXT_MODE_MANIFEST"/g,
            `.version // "${lat}"' "$CONTEXT_MODE_MANIFEST"`
          );
          epContent = epContent.replace(
            /\|\| echo "[0-9]+\.[0-9]+\.[0-9]+"/g,
            `|| echo "${lat}"`
          );
          epContent = epContent.replace(
            /npm:context-mode@[0-9]+\.[0-9]+\.[0-9]+/g,
            `npm:context-mode@${lat}`
          );
          if (epContent !== epBefore) {
            fs.writeFileSync(ep, epContent);
            console.log(`updated ${ep}`);
          }
          NODE

          npm ci --no-audit --no-fund --silent
          npm run generate:agent-seed

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed (replacement found nothing) - aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump context-mode $CUR -> $LAT"
          git push -u origin "${{ steps.branch.outputs.branch }}"
        env:
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          Auto-generated bump of \`context-mode\` from \`$CUR\` to \`$LAT\`.

          The version is shadow-pinned (no package.json entry) so Dependabot can't open this PR - \`bump-shadow-pins.yml\` does it weekly.

          Files updated by string replace + agent-seed regenerate:
          - \`preseed/agents/claude/plugins/context-mode/.claude-plugin/plugin.json\`
          - \`entrypoint.sh\` (CONTEXT_MODE_VERSION + jq/bash fallback strings + Pi disabledPackages pin)
          - \`preseed/agents/claude/plugins/context-mode/README.md\`
          - \`src/lib/agent-seed.generated.ts\` (regenerated)

          ## Test plan
          - [ ] CI green
          - [ ] Smoke test on integration: \`ctx_doctor\` reports the new version
          EOF
          )
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump context-mode $CUR -> $LAT" \
            --body "$BODY"

  graphify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Diff current pin against PyPI latest
        id: ver
        run: |
          set -euo pipefail
          CURRENT=$(jq -r .version preseed/agents/claude/plugins/graphify/.claude-plugin/plugin.json)
          # graphify ships on PyPI as `graphifyy` (Dockerfile: uv tool install graphifyy==$VER).
          LATEST=$(curl -fsSL https://pypi.org/pypi/graphifyy/json | jq -r .info.version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $LATEST, nothing to do."
          else
            echo "Bumping $CURRENT -> $LATEST"
          fi

      - name: Skip if a branch for this version already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="bump/graphify-${{ steps.ver.outputs.latest }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping (existing PR likely open)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
