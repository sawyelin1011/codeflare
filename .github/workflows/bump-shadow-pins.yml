  pi-preseed:
    # EVERY dependency in preseed/agents/pi/package.json is pinned in more than the
    # manifest: each version is mirrored as a literal `npm:<name>@<ver>` install spec
    # in entrypoint.sh's Pi settings `required` array (and CONTEXT_MODE_PACKAGE in
    # codeflare-pi.ts), and baked into src/lib/agent-seed.generated.ts. Dependabot
    # only sees the manifest, so it would drift the entrypoint literals / generated
    # seed out of sync. This job owns ALL Pi preseed pins (the @juicesharp rpiv
    # family, pi-web-access, pi-mcp-adapter, @gotgenes/pi-subagents, context-mode):
    # it diffs each dep against npm latest, applies name-anchored replacements across
    # every copy, regenerates the lockfile + seed, and opens one PR per changed set.
    # (Graphify is no longer an npm pin — it ships as the first-party
    # graphify-native.ts extension.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Diff every Pi preseed pin against npm latest
        id: ver
        run: |
          set -euo pipefail
          # Build a JSON array of {name,cur,lat} for every dependency whose pin is
          # behind npm latest. Empty array => nothing to do.
          CHANGED=$(node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const pkg = require('./preseed/agents/pi/package.json');
          const changed = [];
          for (const [name, cur] of Object.entries(pkg.dependencies || {})) {
            const lat = execFileSync('npm', ['view', name, 'version'], { encoding: 'utf8' }).trim();
            if (cur !== lat) changed.push({ name, cur, lat });
          }
          process.stdout.write(JSON.stringify(changed));
          NODE
          )
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "[]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "All Pi preseed pins already latest, nothing to do."
          else
            echo "Changed set: $CHANGED"
          fi

      - name: Skip if a branch for this change set already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          set -euo pipefail
          # Branch keyed on a hash of the exact changed set so a re-run with the same
          # pending bumps dedupes to the open PR, but a new bump opens a fresh branch.
          HASH=$(printf '%s' '${{ steps.ver.outputs.changed }}' | sha256sum | cut -c1-12)
          BRANCH="bump/pi-preseed-$HASH"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping (existing PR likely open)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          CHANGED='${{ steps.ver.outputs.changed }}' node <<'NODE'
          const fs = require('node:fs');
          const changed = JSON.parse(process.env.CHANGED);
          // Name-anchored replacements only (never a bare version replaceAll) so an
          // unrelated version string elsewhere can never be rewritten.
          function bump(s) {
            for (const { name, cur, lat } of changed) {
              s = s
                .replaceAll(`"${name}": "${cur}"`, `"${name}": "${lat}"`)
                .replaceAll(`npm:${name}@${cur}`, `npm:${name}@${lat}`);
            }
            return s;
          }
          const files = [
            'preseed/agents/pi/package.json',
            'preseed/agents/pi/extensions/codeflare-pi.ts',
            'entrypoint.sh',
            'src/__tests__/lib/agent-seed-manifest.test.ts',
            'host/__tests__/pi-settings-packages.test.js',
          ];
          for (const f of files) {
            const before = fs.readFileSync(f, 'utf-8');
            const after = bump(before);
            if (before !== after) { fs.writeFileSync(f, after); console.log(`updated ${f}`); }
          }
          NODE

          # Regenerate the pi preseed lockfile to match the bumped manifest, then
          # regenerate the embedded agent seed from the preseed tree.
          ( cd preseed/agents/pi && npm install --package-lock-only --no-audit --no-fund )
          npm ci --no-audit --no-fund --silent
          npm run generate:agent-seed

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing changed (replacements found nothing) - aborting."
            exit 1
          fi
          MSG=$(CHANGED='${{ steps.ver.outputs.changed }}' node -e 'const c=JSON.parse(process.env.CHANGED);process.stdout.write(c.map(x=>`${x.name} ${x.cur}->${x.lat}`).join(", "))')
          git commit -m "chore(deps): bump pi preseed ($MSG)"
          git push -u origin "${{ steps.branch.outputs.branch }}"

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LIST=$(CHANGED='${{ steps.ver.outputs.changed }}' node -e 'const c=JSON.parse(process.env.CHANGED);process.stdout.write(c.map(x=>"- "+x.name+" "+x.cur+" -> "+x.lat).join("\n"))')
          TITLE=$(CHANGED='${{ steps.ver.outputs.changed }}' node -e 'const c=JSON.parse(process.env.CHANGED);const f=c.map(x=>x.name+"@"+x.lat).join(", ");process.stdout.write(f.length<=80?f:c.length+" packages")')
          BODY=$(cat <<EOF
          Auto-generated bump of the Pi preseed npm pins:
          $LIST

          Every dependency in \`preseed/agents/pi/package.json\` is pinned in more than the manifest (the entrypoint.sh Pi \`required\` install specs, \`CONTEXT_MODE_PACKAGE\` in codeflare-pi.ts, and the generated agent seed), so Dependabot can't keep them in sync - \`bump-shadow-pins.yml\` owns them.

          Files updated by name-anchored string replace + lockfile + seed regenerate:
          - \`preseed/agents/pi/package.json\` + \`package-lock.json\`
          - \`preseed/agents/pi/extensions/codeflare-pi.ts\` (\`CONTEXT_MODE_PACKAGE\`, when context-mode bumps)
          - \`entrypoint.sh\` (Pi settings \`required\` install specs)
          - \`src/__tests__/lib/agent-seed-manifest.test.ts\` + \`host/__tests__/pi-settings-packages.test.js\` (pinned-version assertions)
          - \`src/lib/agent-seed.generated.ts\` (regenerated)

          ## Test plan
          - [ ] CI green
          - [ ] Review CHANGELOGs for the bumped packages - MAJOR bumps (esp. \`@gotgenes/pi-subagents\`) can change APIs
          - [ ] Smoke test on integration: Pi loads all preseed extensions without error
          EOF
          )
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump pi preseed ($TITLE)" \
            --body "$BODY"

  consult-llm-mcp:
    # consult-llm-mcp is the MCP server Claude Code + Pi use for the consult-llm
    # tool. It is pinned + pre-warmed as a global `npm install -g consult-llm-mcp@X`
    # literal in the Dockerfile (so the runtime MCP config invokes the global bin
    # with no per-session npx fetch). That Dockerfile literal is invisible to
    # Dependabot, so this job bumps it weekly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Diff Dockerfile pin against npm latest
        id: ver
        run: |
          set -euo pipefail
          CURRENT=$(grep -oP 'consult-llm-mcp@\K[0-9][0-9.]*' Dockerfile | head -n1)
          LATEST=$(npm view consult-llm-mcp version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $LATEST, nothing to do."
          else
            echo "Bumping $CURRENT -> $LATEST"
          fi

      - name: Skip if a branch for this version already exists
        if: steps.ver.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="bump/consult-llm-mcp-${{ steps.ver.outputs.latest }}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists, skipping (existing PR likely open)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply bump
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${{ steps.branch.outputs.branch }}"

          node <<'NODE'
          const fs = require('node:fs');
          const cur = process.env.CUR;
          const lat = process.env.LAT;
          const f = 'Dockerfile';
          const before = fs.readFileSync(f, 'utf-8');
          const after = before.replaceAll(`consult-llm-mcp@${cur}`, `consult-llm-mcp@${lat}`);
          if (before !== after) { fs.writeFileSync(f, after); console.log(`updated ${f}`); }
          NODE

          git add Dockerfile
          if git diff --cached --quiet; then
            echo "Nothing changed (replacement found nothing) - aborting."
            exit 1
          fi
          git commit -m "chore(deps): bump consult-llm-mcp $CUR -> $LAT"
          git push -u origin "${{ steps.branch.outputs.branch }}"
        env:
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}

      - name: Open PR
        if: steps.ver.outputs.skip != 'true' && steps.branch.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CUR: ${{ steps.ver.outputs.current }}
          LAT: ${{ steps.ver.outputs.latest }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          Auto-generated bump of \`consult-llm-mcp\` from \`$CUR\` to \`$LAT\`.

          The version is pinned as a \`npm install -g consult-llm-mcp@X\` literal in the \`Dockerfile\` (pre-warmed global install; the Claude Code + Pi MCP config invokes the global bin), so Dependabot can't see it - \`bump-shadow-pins.yml\` opens this PR weekly.

          Files updated:
          - \`Dockerfile\` (\`consult-llm-mcp@$CUR\` -> \`@$LAT\`)

          ## Test plan
          - [ ] CI green (Docker build installs the new version)
          - [ ] Smoke test on integration: \`consult_llm\` responds on Claude + Pi
          EOF
          )
          gh pr create \
            --base develop \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore(deps): bump consult-llm-mcp $CUR -> $LAT" \
            --body "$BODY"

