name: Fuzz

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 0' # Weekly, Sunday 4am UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: Property-based fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create assets directory (wrangler.toml requires web-ui/dist)
        run: mkdir -p web-ui/dist

      - name: Run backend fuzz tests (extended iterations)
        env:
          FAST_CHECK_NUM_RUNS: '50000'
        run: npx vitest run src/__tests__/fuzz/ --reporter=verbose

      - name: Install frontend dependencies
        run: cd web-ui && npm ci

      - name: Run frontend fuzz tests
        env:
          FAST_CHECK_NUM_RUNS: '50000'
        run: cd web-ui && npx vitest run src/__tests__/fuzz/ --reporter=verbose

      - name: Install host dependencies and build
        run: cd host && npm ci && npm run build

      - name: Run host fuzz tests
        env:
          FAST_CHECK_NUM_RUNS: '50000'
        run: cd host && node --test __tests__/fuzz-host.test.js
