name: E2E Tests
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - integration
          - production
        default: integration

permissions:
  contents: read

jobs:
  setup:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 10
    outputs:
      base_url: ${{ steps.target.outputs.base_url }}
      worker_name: ${{ steps.target.outputs.worker_name }}
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Resolve target worker
        id: target
        run: |
          echo "base_url=${{ vars.E2E_BASE_URL }}" >> "$GITHUB_OUTPUT"
          echo "worker_name=${{ vars.CLOUDFLARE_WORKER_NAME }}" >> "$GITHUB_OUTPUT"
          echo "Target: ${{ inputs.environment || 'integration' }}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Ensure SERVICE_AUTH_SECRET is set on target worker
        run: |
          if [ -z "${CF_ACCESS_CLIENT_SECRET}" ]; then
            echo "::error::CF_ACCESS_CLIENT_SECRET is not set in the integration environment."
            exit 1
          fi

          WORKER="${{ steps.target.outputs.worker_name }}"
          echo "Setting SERVICE_AUTH_SECRET on worker: $WORKER"
          printf '%s' "${CF_ACCESS_CLIENT_SECRET}" | npx wrangler secret put SERVICE_AUTH_SECRET --name "$WORKER" 2>&1

          # Seed E2E service user in KV allowlist
          # Uses fixed email matching worker's X-Service-Auth identity
          SERVICE_EMAIL="e2e-service@codeflare.local"
          echo "Seeding E2E service user: ${SERVICE_EMAIL}"

          KV_TITLE="${WORKER}-kv"
          KV_ID=$(npx wrangler kv namespace list 2>&1 \
            | sed -n '/^\[/,/^\]/p' \
            | jq -r --arg title "$KV_TITLE" '.[] | select(.title == $title) | .id' \
            | head -1)

          if [ -n "$KV_ID" ]; then
            KV_VALUE="{\"addedBy\":\"e2e\",\"addedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"role\":\"admin\"}"
            npx wrangler kv key put "user:${SERVICE_EMAIL}" "${KV_VALUE}" --namespace-id "$KV_ID" --remote 2>&1 || \
            echo "::warning::Could not seed E2E user in KV (non-fatal)"
          else
            echo "::warning::KV namespace not found for worker $WORKER (non-fatal)"
          fi

          # Wait for KV eventual consistency + worker secret propagation
          echo "Waiting 15s for KV propagation and worker secret deployment..."
          sleep 15

      - name: Smoke test — verify E2E target is reachable and auth works
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: |
          BASE="$E2E_BASE_URL"

          # Quick health check (no auth needed)
          HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/health" || true)
          echo "Health: $HEALTH"
          if [ "$HEALTH" = "302" ]; then
            echo "::error::CF Access returned 302 on /health. Service token not accepted."
            exit 1
          fi

          # Auth check with retries (KV eventual consistency ~60s)
          for i in 1 2 3 4; do
            SESSIONS=$(curl -sS -o /tmp/sessions.json -w "%{http_code}" "$BASE/api/sessions" \
              -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
              -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
              -H "X-Service-Auth: $CF_ACCESS_CLIENT_SECRET" || true)
            echo "Attempt $i: /api/sessions -> $SESSIONS"

            if [ "$SESSIONS" = "200" ]; then
              echo "Auth working!"
              break
            fi

            if [ "$SESSIONS" = "302" ]; then
              echo "::error::CF Access returned 302. Service token not accepted."
              exit 1
            fi

            if [ "$i" -lt 4 ]; then
              echo "Waiting 15s for KV propagation..."
              sleep 15
            fi
          done

          if [ "$SESSIONS" = "401" ] || [ "$SESSIONS" = "403" ]; then
            echo "::error::Auth failed ($SESSIONS) after retries. Check SERVICE_AUTH_SECRET and KV user seeding."
            exit 1
          fi

  e2e-api:
    needs: setup
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      E2E_SUITE: api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run E2E API tests
        run: npm run test:e2e:api

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-api
          path: e2e-artifacts/
          retention-days: 5

  e2e-ui-desktop:
    needs: [setup, e2e-api]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      E2E_SUITE: ui-desktop
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}

      - name: Cache web-ui node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache-webui
        with:
          path: web-ui/node_modules
          key: webui-${{ hashFiles('web-ui/package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web-ui dependencies
        if: steps.cache-webui.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-ui

      - name: Install Chrome and system dependencies
        run: |
          # Install Chrome via Puppeteer
          npx puppeteer browsers install chrome
          # Install all required shared libraries for headless Chrome
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1 \
            libxfixes3 libx11-xcb1 libxext6 libxi6 libxtst6 libxcursor1 \
            fonts-liberation

      - name: Run E2E UI Desktop tests
        run: npm run test:e2e:ui-desktop

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-ui-desktop
          path: e2e-artifacts/
          retention-days: 5

  e2e-ui-mobile:
    needs: [setup, e2e-ui-desktop]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      E2E_SUITE: ui-mobile
      E2E_MOBILE: '1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}

      - name: Cache web-ui node_modules
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache-webui
        with:
          path: web-ui/node_modules
          key: webui-${{ hashFiles('web-ui/package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web-ui dependencies
        if: steps.cache-webui.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-ui

      - name: Install Chrome and system dependencies
        run: |
          # Install Chrome via Puppeteer
          npx puppeteer browsers install chrome
          # Install all required shared libraries for headless Chrome
          sudo apt-get update -qq
          sudo apt-get install -yqq --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2 libxshmfence1 \
            libxfixes3 libx11-xcb1 libxext6 libxi6 libxtst6 libxcursor1 \
            fonts-liberation

      - name: Run E2E UI Mobile tests
        run: npm run test:e2e:ui-mobile

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-ui-mobile
          path: e2e-artifacts/
          retention-days: 5
