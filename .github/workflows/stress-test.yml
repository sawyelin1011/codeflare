name: Stress Test

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        type: choice
        options:
          - all
          - api-throughput
          - session-lifecycle
          - storage-operations
          - rate-limit-validation
        default: all

permissions:
  contents: read

concurrency:
  group: stress-test
  cancel-in-progress: true

jobs:
  setup:
    name: Verify target
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 10
    outputs:
      base_url: ${{ steps.target.outputs.base_url }}
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@4.68.1

      - name: Resolve target
        id: target
        run: |
          RAW="${{ vars.E2E_BASE_URL }}"
          RAW="${RAW#http://}" && BASE="https://${RAW#https://}"
          echo "base_url=$BASE" >> "$GITHUB_OUTPUT"
          echo "Target: $BASE"

      - name: Ensure SERVICE_AUTH_SECRET is set on target worker
        run: |
          AUTH_SECRET="${CF_ACCESS_CLIENT_SECRET:-${OAUTH_E2E_TEST_SECRET}}"
          if [ -z "${AUTH_SECRET}" ]; then
            echo "::error::Neither CF_ACCESS_CLIENT_SECRET nor OAUTH_E2E_TEST_SECRET is set."
            exit 1
          fi

          WORKER="${{ vars.CLOUDFLARE_WORKER_NAME }}"
          echo "Setting SERVICE_AUTH_SECRET on worker: $WORKER"
          printf '%s' "${AUTH_SECRET}" | wrangler secret put SERVICE_AUTH_SECRET --name "$WORKER" 2>&1

          # Seed stress test service user in KV allowlist
          SERVICE_EMAIL="e2e-service@codeflare.local"
          echo "Seeding service user: ${SERVICE_EMAIL}"

          KV_TITLE="${WORKER}-kv"
          KV_ID=$(wrangler kv namespace list 2>&1 \
            | sed -n '/^\[/,/^\]/p' \
            | jq -r --arg title "$KV_TITLE" '.[] | select(.title == $title) | .id' \
            | head -1)

          if [ -n "$KV_ID" ]; then
            KV_VALUE="{\"addedBy\":\"stress-test\",\"addedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"role\":\"admin\"}"
            wrangler kv key put "user:${SERVICE_EMAIL}" "${KV_VALUE}" --namespace-id "$KV_ID" --remote 2>&1 || \
            echo "::warning::Could not seed service user in KV (non-fatal)"
          else
            echo "::warning::KV namespace not found for worker $WORKER (non-fatal)"
          fi

          echo "Waiting 15s for KV propagation and worker secret deployment..."
          sleep 15

      - name: Smoke test
        env:
          E2E_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: |
          BASE="$E2E_BASE_URL"

          # Health check (no auth needed)
          HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" "$BASE/health" || true)
          echo "Health: $HEALTH"
          if [ "$HEALTH" != "200" ]; then
            echo "::error::Health check failed ($HEALTH)"
            exit 1
          fi

          # Auth check with retries (worker secret propagation + KV consistency)
          AUTH_SECRET="${CF_ACCESS_CLIENT_SECRET:-${OAUTH_E2E_TEST_SECRET}}"
          for i in 1 2 3 4; do
            SESSIONS=$(curl -sS -o /tmp/sessions.json -w "%{http_code}" "$BASE/api/sessions" \
              ${CF_ACCESS_CLIENT_ID:+-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"} \
              ${CF_ACCESS_CLIENT_SECRET:+-H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"} \
              -H "X-Service-Auth: $AUTH_SECRET" || true)
            echo "Attempt $i: /api/sessions -> $SESSIONS"

            if [ "$SESSIONS" = "200" ]; then
              echo "Auth working!"
              break
            fi

            if [ "$SESSIONS" = "302" ]; then
              LOCATION=$(curl -sS -o /dev/null -D - "$BASE/api/sessions" \
                ${CF_ACCESS_CLIENT_ID:+-H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"} \
                ${CF_ACCESS_CLIENT_SECRET:+-H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"} \
                -H "X-Service-Auth: $AUTH_SECRET" 2>/dev/null \
                | grep -i "^location:" || true)
              echo "302 redirect location: $LOCATION"
            fi

            if [ "$i" -lt 4 ]; then
              echo "Waiting 15s for worker secret propagation..."
              sleep 15
            fi
          done

          if [ "$SESSIONS" = "302" ] || [ "$SESSIONS" = "401" ] || [ "$SESSIONS" = "403" ]; then
            echo "::error::Auth failed ($SESSIONS) after retries — check CF Access service token and worker SERVICE_AUTH_SECRET"
            exit 1
          elif [ "$SESSIONS" != "200" ]; then
            echo "::error::Auth failed ($SESSIONS) after retries"
            exit 1
          fi

  api-throughput:
    name: API throughput
    needs: setup
    if: inputs.suite == 'all' || inputs.suite == 'api-throughput'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.56.0-linux-amd64/k6 /usr/local/bin/

      - name: Run API throughput test
        env:
          STRESS_TEST_CONCURRENCY: ${{ vars.STRESS_TEST_CONCURRENCY || '0' }}
        run: |
          k6 run e2e/stress/api-throughput.js \
            --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
            --summary-export=api-throughput-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-api-throughput
          path: api-throughput-results.json
          retention-days: 30

  session-lifecycle:
    name: Session lifecycle
    needs: setup
    if: inputs.suite == 'all' || inputs.suite == 'session-lifecycle'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.56.0-linux-amd64/k6 /usr/local/bin/

      - name: Run session lifecycle test
        env:
          STRESS_TEST_CONCURRENCY: ${{ vars.STRESS_TEST_CONCURRENCY || '0' }}
        run: |
          k6 run e2e/stress/session-lifecycle.js \
            --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
            --summary-export=session-lifecycle-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-session-lifecycle
          path: session-lifecycle-results.json
          retention-days: 30

  storage-operations:
    name: Storage operations
    needs: setup
    if: inputs.suite == 'all' || inputs.suite == 'storage-operations'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 15
    env:
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.56.0-linux-amd64/k6 /usr/local/bin/

      - name: Run storage operations test
        env:
          STRESS_TEST_CONCURRENCY: ${{ vars.STRESS_TEST_CONCURRENCY || '0' }}
        run: |
          k6 run e2e/stress/storage-operations.js \
            --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
            --summary-export=storage-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-storage-operations
          path: storage-results.json
          retention-days: 30

  rate-limit-validation:
    name: Stress Test with Rate Limits
    needs: setup
    if: inputs.suite == 'rate-limit-validation'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: integration
    timeout-minutes: 10
    env:
      E2E_BASE_URL: ${{ needs.setup.outputs.base_url }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.56.0/k6-v0.56.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.56.0-linux-amd64/k6 /usr/local/bin/

      - name: Validate rate limits are enforced
        run: |
          k6 run e2e/stress/rate-limit-validation.js \
            --summary-trend-stats="avg,min,med,max,p(90),p(95),p(99)" \
            --summary-export=rate-limit-results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stress-rate-limit-validation
          path: rate-limit-results.json
          retention-days: 30

  summary:
    name: Summary
    needs: [api-throughput, session-lifecycle, storage-operations, rate-limit-validation]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: stress-*
          merge-multiple: true

      - name: Print summary
        run: |
          echo "## Stress Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for f in *-results.json; do
            if [ -f "$f" ]; then
              name=$(echo "$f" | sed 's/-results.json//' | tr '-' ' ')
              echo "### ${name}" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              cat "$f" | head -100 >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "Results exported as artifacts (retained 30 days)." >> "$GITHUB_STEP_SUMMARY"

      - name: Check thresholds
        run: |
          failed=0
          for f in *-results.json; do
            if [ -f "$f" ]; then
              # k6 summary export includes threshold pass/fail
              if grep -q '"thresholds"' "$f" 2>/dev/null; then
                if grep -q '"ok":false' "$f" 2>/dev/null; then
                  echo "FAIL: Threshold breached in $f"
                  failed=1
                else
                  echo "PASS: All thresholds met in $f"
                fi
              fi
            fi
          done
          exit $failed
