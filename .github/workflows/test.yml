name: PR Checks
# Fires on:
#   - push to develop (fast feedback on integration-branch work)
#   - push to main (post-merge regression gate; Deploy fires only on green)
#   - pull_request targeting main OR develop (pre-merge gate; develop
#     is included so the feature → develop step of the canonical flow
#     gets the same pre-merge signal as feature → main does)
#   - workflow_dispatch (manual re-run)
#
# Cost note: per merge to main this fires twice — once pre-merge on
# the PR head (pull_request) and once post-merge on the merge commit
# (push). The post-merge run is the one Deploy gates on via
# workflow_run; the pre-merge run is what blocks the merge button.
# The doubled run is the explicit cost of closing the parallel-
# trigger race that the old `push: [main]` deploy left open.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}

      - name: Cache web-ui node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-webui
        with:
          path: web-ui/node_modules
          key: webui-${{ hashFiles('web-ui/package-lock.json') }}

      - name: Cache host node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-host
        with:
          path: host/node_modules
          key: host-${{ hashFiles('host/package-lock.json') }}

      - name: Cache landing node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-landing
        with:
          path: landing/node_modules
          key: landing-${{ hashFiles('landing/package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web-ui dependencies
        if: steps.cache-webui.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-ui

      - name: Agent seed generator drift guard
        # The committed src/lib/agent-seed.generated.ts must equal a fresh generation
        # from preseed/. `pretest` regenerates it during `npm test`, so a stale committed
        # copy would silently ship OLD extension bytes to R2/containers (the deploy-seeding
        # path embeds this file). Fail fast if the generator output drifts from what is
        # committed. The generator uses only Node builtins, so it needs no node_modules.
        run: |
          node scripts/generate-agent-seed.mjs
          git diff --exit-code src/lib/agent-seed.generated.ts \
            || { echo "::error::agent-seed.generated.ts is stale — run 'npm run generate:agent-seed' and commit the result"; exit 1; }

      - name: Lint backend
        run: npm run lint

      - name: Lint frontend
        run: npm run lint
        working-directory: web-ui

      - name: Dead code check (backend)
        run: npm run knip

      - name: Dead code check (frontend)
        run: npm run knip
        working-directory: web-ui

      - name: Build frontend
        run: npm run build
        working-directory: web-ui

      - name: Run backend tests
        # @cloudflare/vitest-pool-workers 0.16.x crashes workerd at pool teardown
        # ("Worker exited unexpectedly") AFTER every test has passed — a known upstream
        # flake (cloudflare/workers-sdk), not a test failure. `isolate: false` does NOT
        # fix it (it crashes the pool during collection instead — verified in CI), so the
        # crash is tolerated here. NO_COLOR keeps the summary plain text so the guard can
        # read it. The guard accepts a non-zero exit ONLY when all hold: the pool-crash
        # fingerprint is present, at least one test passed, and nothing failed. The error
        # count is NOT pinned: per-file isolation tears down one workerd isolate per file,
        # so a busy suite emits 2+ of the same teardown crash (verified in CI). A real
        # failure still prints "N failed" and fails the job. isolate:false (the documented
        # WS+DO fix) is unusable here — it crashes collection (0 tests). Keep in sync with
        # deploy.yml.
        env:
          NO_COLOR: '1'
          FORCE_COLOR: '0'
        run: |
          set +e
          npm test 2>&1 | tee /tmp/backend-tests.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then exit 0; fi
          if grep -Fq '[vitest-pool]: Worker cloudflare-pool emitted error.' /tmp/backend-tests.log \
            && grep -Eq 'Errors[[:space:]]+[0-9]+ error' /tmp/backend-tests.log \
            && grep -Eq 'Tests[[:space:]]+[0-9]+ passed' /tmp/backend-tests.log \
            && ! grep -Eq '(Test Files|Tests)[[:space:]]+[0-9]+ failed' /tmp/backend-tests.log; then
            echo "Accepting backend tests: all tests passed; only the known workerd teardown crash remained"
            exit 0
          fi
          exit "$status"

      - name: Install host dependencies
        if: steps.cache-host.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: host

      - name: Build host (TypeScript)
        run: npm run build
        working-directory: host

      - name: Run host hook tests (node:test)
        # 15 test files excluded: they need graphify CLI, python3 graphify
        # module, rclone, or gh-in-PR-context that only exist inside the
        # codeflare container. They run during development, not in CI.
        run: |
          node --experimental-test-module-mocks --test --test-timeout=60000 \
            $(ls host/__tests__/*.test.js \
              | grep -v -E '(entrypoint-bisync-behavior|entrypoint-context-mode|entrypoint-graphify-bisync|entrypoint-graphify-mcp|entrypoint-hooks-merge|entrypoint-shutdown|enforce-ctx-mode\.test|enforce-review-spawn|graphify-clone-prompt|graphify-session-start|lane-classifier|memory-context-inject|memory-prompt-iso-ts|preseed-graphify-discipline|skill-sdd-init-contract)')
        timeout-minutes: 5

      - name: Run frontend tests
        run: npm test
        working-directory: web-ui

      - name: Install landing dependencies
        if: steps.cache-landing.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: landing

      - name: Run landing tests
        # Container-API render tests + pure-logic unit tests (landing/README.md)
        run: npm test
        working-directory: landing

      - name: Generate Workers runtime types
        run: npx wrangler types

      - name: Type check backend
        run: npm run typecheck
        timeout-minutes: 5

      - name: Type check frontend
        run: npm run typecheck
        working-directory: web-ui
        timeout-minutes: 5

      - name: Security audit (backend)
        run: npm audit --audit-level=high --omit=dev

      - name: Security audit (frontend)
        run: cd web-ui && npm audit --audit-level=high --omit=dev

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
