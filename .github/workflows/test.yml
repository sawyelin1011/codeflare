name: PR Checks
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}

      - name: Cache web-ui node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-webui
        with:
          path: web-ui/node_modules
          key: webui-${{ hashFiles('web-ui/package-lock.json') }}

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web-ui dependencies
        if: steps.cache-webui.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-ui

      - name: Lint backend
        run: npm run lint

      - name: Lint frontend
        run: npm run lint
        working-directory: web-ui

      - name: Dead code check (backend)
        run: npm run knip

      - name: Dead code check (frontend)
        run: npm run knip
        working-directory: web-ui

      - name: Build frontend
        run: npm run build
        working-directory: web-ui

      - name: Run backend tests
        # @cloudflare/vitest-pool-workers hard-codes a `[vpw:info] Starting runtime for ...`
        # log on every test file (LogLevel.VERBOSE, no config to silence). Filter the spam
        # so the CI test output stays readable. set -o pipefail keeps the exit code from npm.
        run: set -o pipefail && npm test 2>&1 | grep -v -F '[vpw:info] Starting runtime for'

      - name: Run frontend tests
        run: npm test
        working-directory: web-ui

      - name: Type check backend
        run: npm run typecheck
        timeout-minutes: 5

      - name: Type check frontend
        run: npm run typecheck
        working-directory: web-ui
        timeout-minutes: 5

      - name: Security audit (backend)
        run: npm audit --audit-level=high --omit=dev

      - name: Security audit (frontend)
        run: cd web-ui && npm audit --audit-level=high --omit=dev

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
