name: Deploy
# main is the protected production branch; the only push that reaches
# it is a merged PR. workflow_run waits for that PR's "PR Checks" to
# finish on the merge commit and only deploys when it ended green.
# This closes the "we shipped a broken main" window that plain
# `push: [main]` left open when the checks and deploy triggered in
# parallel off the same SHA. workflow_dispatch stays so a stuck
# deploy can be re-run manually, and so integration deploys from
# develop (or any other branch) can still be triggered on demand.
on:
  workflow_run:
    workflows: ['PR Checks']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        type: choice
        options:
          - production
          - integration
        default: integration
      action:
        description: 'Action: deploy (default) or r2-nuke (REQ-SEC-017: delete all R2 objects)'
        type: choice
        options:
          - deploy
          - r2-nuke
        default: deploy
      r2_nuke_confirmation:
        description: 'Type DELETE-ALL-R2-OBJECTS to authorize r2-nuke (ignored when action=deploy)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') && (inputs.environment || 'production') || 'integration' }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write  # type=gha buildx cache writes to the Actions cache service

jobs:
  deploy:
    # The deploy job runs on workflow_run (post-PR-merge to main) OR on
    # workflow_dispatch when action=deploy (the default). When the
    # operator picks action=r2-nuke, deploy is skipped and the r2-nuke
    # job below runs instead. This keeps the destructive R2 purge fully
    # mutually exclusive from a deploy so a one-time migration cannot
    # accidentally ship code at the same time.
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.action != 'r2-nuke') ||
      (github.event_name == 'workflow_run'
       && github.event.workflow_run.conclusion == 'success'
       && github.event.workflow_run.event == 'push'
       && github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    # On workflow_run: only deploy when PR Checks ended green.
    # On workflow_dispatch (manual): always run; the inner production-
    # only-from-main step still rejects bad input.
    #
    # The if: lives on the deploy job itself (not on a separate guard
    # job with `needs: guard`) because GitHub Actions treats a job
    # skipped via if: as success() for `needs:` resolution. A failed
    # PR Checks would skip the guard but the deploy job's needs:
    # would still be satisfied — the gate must be on the job that
    # actually performs the deploy.
    # Two additional workflow_run guards beyond conclusion==success defeat
    # the public-repo pwn-request vector. PR Checks fires on both push and
    # pull_request to main/develop. A fork PR with a head branch named
    # 'main' would pass the outer workflow_run `branches: [main]` filter
    # (the filter matches the PR head ref name, not the source repo).
    # Without the two extra guards below, the deploy job would check out
    # the fork's untrusted SHA with actions:write perms and access to
    # deploy secrets. Hardened as a result of Scorecard DangerousWorkflowID
    # alert #34 audit.
    #   workflow_run.event == 'push'                   -- only post-merge runs trigger deploy
    #   head_repository.full_name == github.repository -- and only from this repo, never a fork
    environment: ${{ github.ref == 'refs/heads/main' && (inputs.environment || 'production') || 'integration' }}
    timeout-minutes: 30
    env:
      WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME || 'codeflare' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Block production deploys from non-main branches
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' && inputs.environment == 'production'
        run: |
          echo "::error::Production deploys are only allowed from main. Got branch: ${{ github.ref }}"
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # On workflow_run: pin to the SHA whose PR Checks just ended
          # green. Without this, actions/checkout falls back to default-
          # branch HEAD at deploy-job start time, which can drift if a
          # second push lands on main between the green check and the
          # deploy. On workflow_dispatch / push: github.ref is the
          # dispatched ref; head_sha is empty so the OR falls through.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Cache root node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-root
        with:
          path: node_modules
          key: root-${{ hashFiles('package-lock.json') }}
          restore-keys: root-

      - name: Cache web-ui node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: cache-webui
        with:
          path: web-ui/node_modules
          key: webui-${{ hashFiles('web-ui/package-lock.json') }}
          restore-keys: webui-

      - name: Install root dependencies
        if: steps.cache-root.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web-ui dependencies
        if: steps.cache-webui.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: web-ui

      - name: Build frontend
        run: npm run build
        working-directory: web-ui

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        run: npm test
        working-directory: web-ui

      - name: Type check backend
        run: npm run typecheck

      - name: Type check frontend
        run: npm run typecheck
        working-directory: web-ui

      - name: Resolve KV namespace
        run: |
          KV_TITLE="${WORKER_NAME}-kv"

          # Check if namespace already exists
          KV_ID=$(npx wrangler kv namespace list 2>/dev/null \
            | sed -n '/^\[/,/^\]/p' \
            | jq -r --arg title "$KV_TITLE" '.[] | select(.title == $title) | .id' \
            | head -1)

          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace: $KV_TITLE"
            KV_ID=$(npx wrangler kv namespace create "$KV_TITLE" 2>&1 \
              | grep -oP '"[a-f0-9]{32}"' | tr -d '"' | head -1)
          fi

          if [ -z "$KV_ID" ]; then
            echo "::error::Failed to resolve KV namespace ID"
            exit 1
          fi

          echo "KV namespace ID: $KV_ID"
          sed -i "s/id = \"placeholder\"/id = \"$KV_ID\"/" wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply worker name to wrangler config
        run: |
          sed -i "0,/^name = \".*\"/{s/^name = \".*\"/name = \"${WORKER_NAME}\"/}" wrangler.toml
          echo "Using worker name: ${WORKER_NAME}"
          sed -n '1,8p' wrangler.toml
          echo "--- Verifying DO binding intact ---"
          grep 'name = "CONTAINER"' wrangler.toml || { echo "FATAL: DO binding name corrupted!"; exit 1; }

      - name: Apply container resource tier
        env:
          TIER: ${{ vars.RESSOURCE_TIER || 'default' }}
          MAX_INSTANCES_OVERRIDE: ${{ vars.MAX_INSTANCES }}
        run: |
          MAX_INSTANCES=10

          case "$TIER" in
            low)
              # 0.25 vCPU / 1 GiB RAM / 4 GB disk (Cloudflare basic preset)
              INSTANCE_BLOCK='instance_type = "basic"'
              ;;
            high)
              INSTANCE_BLOCK=$'[containers.instance_type]\nvcpu = 2\nmemory_mib = 6144\ndisk_mb = 8000'
              ;;
            saas|default)
              INSTANCE_BLOCK=$'[containers.instance_type]\nvcpu = 1\nmemory_mib = 3072\ndisk_mb = 6000'
              ;;
            *)
              echo "::error::Invalid RESSOURCE_TIER=\"$TIER\". Allowed values: low, high, saas. Leave unset for default."
              exit 1
              ;;
          esac

          # Override max_instances if MAX_INSTANCES variable is set
          if [ -n "$MAX_INSTANCES_OVERRIDE" ]; then
            if ! echo "$MAX_INSTANCES_OVERRIDE" | grep -qE '^[1-9][0-9]*$'; then
              echo "::error::MAX_INSTANCES must be a positive integer, got: $MAX_INSTANCES_OVERRIDE"
              exit 1
            fi
            MAX_INSTANCES="$MAX_INSTANCES_OVERRIDE"
          fi

          awk -v block="$INSTANCE_BLOCK" -v max_instances="$MAX_INSTANCES" '
            BEGIN {
              skip_old = 0;
            }
            {
              if ($0 ~ /^max_instances = /) {
                print "max_instances = " max_instances;
                print "";
                n = split(block, lines, "\n");
                for (i = 1; i <= n; i++) {
                  print lines[i];
                }
                skip_old = 1;
                next;
              }

              if (skip_old == 1) {
                if ($0 ~ /^\[containers\.instance_type\]/) next;
                if ($0 ~ /^vcpu = /) next;
                if ($0 ~ /^memory_mib = /) next;
                if ($0 ~ /^disk_mb = /) next;
                if ($0 ~ /^instance_type = /) next;
                if ($0 ~ /^$/) next;
                skip_old = 0;
              }

              print $0;
            }
          ' wrangler.toml > wrangler.toml.tmp

          mv wrangler.toml.tmp wrangler.toml

          echo "Using RESSOURCE_TIER=${TIER}"
          echo "Resolved max_instances=${MAX_INSTANCES}"
          echo "Resolved container config:"
          sed -n '30,52p' wrangler.toml

      - name: Generate cache buster (optional — force fresh npm install)
        if: ${{ vars.CLAUDE_CODE_CACHE_BUSTER == 'active' }}
        run: echo "${{ github.sha }}" > .cache-bust

      # The 'default' docker builder doesn't support type=gha cache. The
      # docker-container driver (provisioned by setup-buildx-action) does
      # and is what unlocks --cache-from / --cache-to against the
      # built-in GitHub Actions cache service. No extra registry creds.
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build container image
        id: docker-build
        run: |
          IMAGE_TAG="${{ github.sha }}"
          IMAGE_NAME="${WORKER_NAME}-container"
          # --load keeps the image available to the local docker daemon
          # so the Trivy scan step and the wrangler push step that follow
          # can reference it by tag, unchanged.
          docker buildx build --platform linux/amd64 \
            --cache-from type=gha,scope=cloudflare \
            --cache-to type=gha,mode=max,scope=cloudflare \
            --load \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "local_ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Free disk space for Trivy scan
        run: docker builder prune -af && rm -rf /tmp/trivy-* || true

      - name: Scan container image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.docker-build.outputs.local_ref }}
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
          scanners: vuln
          trivyignores: .trivyignore
          timeout: 15m

      - name: Push image to Cloudflare registry
        id: push-image
        run: |
          IMAGE_NAME="${{ steps.docker-build.outputs.image_name }}"
          IMAGE_TAG="${{ steps.docker-build.outputs.image_tag }}"

          npx wrangler containers push "${IMAGE_NAME}:${IMAGE_TAG}" 2>&1 | tee /tmp/push-output.txt

          # Extract the registry URI from the "Pushed image:" line (includes tag)
          REGISTRY_URI=$(grep -oP '(?<=Pushed image: )registry\.cloudflare\.com/\S+' /tmp/push-output.txt | head -1)

          if [ -z "$REGISTRY_URI" ]; then
            echo "::error::Failed to extract registry URI from wrangler containers push output"
            cat /tmp/push-output.txt
            exit 1
          fi

          echo "Registry URI: ${REGISTRY_URI}"
          echo "registry_uri=${REGISTRY_URI}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Point wrangler.toml to pre-pushed image
        run: |
          REGISTRY_URI="${{ steps.push-image.outputs.registry_uri }}"
          sed -i "s|image = \"./Dockerfile\"|image = \"${REGISTRY_URI}\"|" wrangler.toml
          echo "--- Verifying image config ---"
          grep 'image =' wrangler.toml

      - name: Deploy to Cloudflare
        run: >-
          npx wrangler deploy --name "${WORKER_NAME}"
          --var ONBOARDING_LANDING_PAGE:${{ vars.ONBOARDING_LANDING_PAGE || 'inactive' }}
          --var CLOUDFLARE_WORKER_NAME:${WORKER_NAME}
          ${{ vars.MAX_SESSIONS_USER && format('--var MAX_SESSIONS_USER:{0}', vars.MAX_SESSIONS_USER) || '' }}
          ${{ vars.MAX_SESSIONS_ADMIN && format('--var MAX_SESSIONS_ADMIN:{0}', vars.MAX_SESSIONS_ADMIN) || '' }}
          ${{ vars.STRESS_TEST_MODE && format('--var STRESS_TEST_MODE:{0}', vars.STRESS_TEST_MODE) || '' }}
          ${{ vars.SAAS_MODE && format('--var SAAS_MODE:{0}', vars.SAAS_MODE) || '' }}
          ${{ vars.SAAS_EXTRA_IDPS && format('--var SAAS_EXTRA_IDPS:{0}', vars.SAAS_EXTRA_IDPS) || '' }}
          ${{ vars.SAAS_MODE == 'active' && secrets.OAUTH_CLIENT_ID && format('--var OAUTH_CLIENT_ID:{0}', secrets.OAUTH_CLIENT_ID) || '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set API token as worker secret
        run: printf '%s' "${{ secrets.CLOUDFLARE_API_TOKEN }}" | npx wrangler secret put CLOUDFLARE_API_TOKEN --name "${WORKER_NAME}" 2>/dev/null
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set service auth secret for E2E testing (optional)
        run: |
          # Use CF_ACCESS_CLIENT_SECRET (CF Access mode) or OAUTH_E2E_TEST_SECRET (GitHub OIDC mode)
          AUTH_SECRET="${CF_ACCESS_CLIENT_SECRET:-${OAUTH_E2E_TEST_SECRET}}"
          if [ -z "${AUTH_SECRET}" ]; then
            echo "No CF_ACCESS_CLIENT_SECRET or OAUTH_E2E_TEST_SECRET — skipping service auth setup"
            exit 0
          fi

          printf '%s' "${AUTH_SECRET}" | npx wrangler secret put SERVICE_AUTH_SECRET --name "${WORKER_NAME}" 2>/dev/null

          # Seed E2E service user in KV allowlist (fixed email matching worker's X-Service-Auth identity)
          SERVICE_EMAIL="e2e-service@codeflare.local"
          echo "Seeding E2E service user: ${SERVICE_EMAIL}"
          KV_VALUE="{\"addedBy\":\"deploy\",\"addedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"role\":\"admin\"}"
          npx wrangler kv key put "user:${SERVICE_EMAIL}" "${KV_VALUE}" --binding KV --remote 2>/dev/null || \
          echo "::warning::Could not seed E2E user in KV (non-fatal)"
        env:
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          OAUTH_E2E_TEST_SECRET: ${{ secrets.OAUTH_E2E_TEST_SECRET }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Resend secrets (onboarding or SaaS mode)
        if: ${{ vars.ONBOARDING_LANDING_PAGE == 'active' || vars.SAAS_MODE == 'active' }}
        run: |
          if [ -z "${RESEND_API_KEY}" ]; then
            echo "::warning::RESEND_API_KEY not set — email notifications will be skipped"
            exit 0
          fi
          printf '%s' "${RESEND_API_KEY}" | npx wrangler secret put RESEND_API_KEY --name "${WORKER_NAME}" 2>/dev/null
          if [ -n "${RESEND_EMAIL}" ]; then
            printf '%s' "${RESEND_EMAIL}" | npx wrangler secret put RESEND_EMAIL --name "${WORKER_NAME}" 2>/dev/null
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_EMAIL: ${{ secrets.RESEND_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Stripe secrets (SaaS mode, optional)
        if: ${{ vars.SAAS_MODE == 'active' }}
        run: |
          if [ -n "${STRIPE_SECRET_KEY}" ]; then
            printf '%s' "${STRIPE_SECRET_KEY}" | npx wrangler secret put STRIPE_SECRET_KEY --name "${WORKER_NAME}" 2>/dev/null
          fi
          if [ -n "${STRIPE_WEBHOOK_SECRET}" ]; then
            printf '%s' "${STRIPE_WEBHOOK_SECRET}" | npx wrangler secret put STRIPE_WEBHOOK_SECRET --name "${WORKER_NAME}" 2>/dev/null
          fi
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set GitHub OIDC secrets (SaaS mode, optional)
        if: ${{ vars.SAAS_MODE == 'active' }}
        run: |
          if [ -n "${OAUTH_CLIENT_SECRET}" ]; then
            printf '%s' "${OAUTH_CLIENT_SECRET}" | npx wrangler secret put OAUTH_CLIENT_SECRET --name "${WORKER_NAME}" 2>/dev/null
          fi
          if [ -n "${OAUTH_JWT_SECRET}" ]; then
            printf '%s' "${OAUTH_JWT_SECRET}" | npx wrangler secret put OAUTH_JWT_SECRET --name "${WORKER_NAME}" 2>/dev/null
          fi
        env:
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_JWT_SECRET: ${{ secrets.OAUTH_JWT_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set encryption key as worker secret (optional)
        run: |
          if [ -z "${ENC_KEY}" ]; then
            echo "No ENCRYPTION_KEY — credentials stored as plaintext, R2 uses default encryption"
            exit 0
          fi
          printf '%s' "${ENC_KEY}" | npx wrangler secret put ENCRYPTION_KEY --name "${WORKER_NAME}" 2>/dev/null
          echo "Encryption key set (AES-256-GCM for KV, SSE-C for R2)"
        env:
          ENC_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Prune old container images from CF registry, scoped to THIS deploy's repo.
      # Registry size is capped by the instance type's available disk; without
      # pruning, every deploy leaves a tag in registry.cloudflare.com forever
      # and eventually `wrangler containers push` starts dropping connections
      # mid-upload ("use of closed network connection"). Keeps the last KEEP_N
      # tags by image creation time PLUS the currently-deployed SHA as
      # rollback floor; deletes the rest. Wrangler exposes `containers images
      # delete` but only under its OAuth-login flow - the API token in CI
      # cannot use that path, so this step talks to the Docker Registry v2 API
      # directly via short-lived credentials minted from the CF API.
      # Non-fatal: any registry/network error here is logged as a warning and
      # the deploy is treated as successful. Cleanup is best-effort.
      - name: Prune old container images
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REGISTRY_URI: ${{ steps.push-image.outputs.registry_uri }}
          KEEP_N: '10'
        run: |
          node -e '
          (async () => {
            const ACCT = process.env.CLOUDFLARE_ACCOUNT_ID;
            const TOKEN = process.env.CLOUDFLARE_API_TOKEN;
            const URI = process.env.REGISTRY_URI || "";
            const KEEP_N = parseInt(process.env.KEEP_N || "10", 10);
            // URI shape: registry.cloudflare.com/<acct>/<repo>:<tag>
            const m = URI.match(/^registry\.cloudflare\.com\/([^/]+)\/([^:]+):(.+)$/);
            if (!m) { console.log("::warning::could not parse REGISTRY_URI=" + URI + "; skipping prune"); return; }
            const [, uriAcct, repo, deployedTag] = m;
            if (uriAcct !== ACCT) { console.log("::warning::URI account does not match CLOUDFLARE_ACCOUNT_ID; skipping prune"); return; }
            console.log("Pruning " + repo + " (keep " + KEEP_N + " newest + deployed " + deployedTag + ")");

            const credR = await fetch("https://api.cloudflare.com/client/v4/accounts/" + ACCT + "/containers/registries/registry.cloudflare.com/credentials",
              { method: "POST", headers: { Authorization: "Bearer " + TOKEN, "Content-Type": "application/json" },
                body: JSON.stringify({ expiration_minutes: 30, permissions: ["pull","push"] }) });
            const credJ = await credR.json();
            if (!credJ.success) { console.log("::warning::mint creds failed: " + JSON.stringify(credJ.errors)); return; }
            const auth = "Basic " + Buffer.from(credJ.result.username + ":" + credJ.result.password).toString("base64");
            const accept = [
              "application/vnd.docker.distribution.manifest.v2+json",
              "application/vnd.docker.distribution.manifest.list.v2+json",
              "application/vnd.oci.image.manifest.v1+json",
              "application/vnd.oci.image.index.v1+json"
            ].join(",");
            const base = "https://registry.cloudflare.com/v2/" + ACCT + "/" + repo;

            // Enumerate every tag (paginated). Docker Registry v2 paginates
            // lexicographically, not by recency. If any page errors, we MUST
            // fail closed - a partial enumeration biases the "newest by
            // creation time" selection toward whichever lexical slice we did
            // see, and the digest-protection invariant below cannot protect
            // tags we never knew existed.
            const tags = [];
            let last = "";
            let complete = true;
            for (let p = 0; p < 200; p++) {
              const url = base + "/tags/list?n=500" + (last ? "&last=" + encodeURIComponent(last) : "");
              const r = await fetch(url, { headers: { Authorization: auth } });
              if (!r.ok) { console.log("::warning::tags/list HTTP " + r.status); complete = false; break; }
              const j = await r.json();
              const page = j.tags || [];
              if (!page.length) break;
              tags.push(...page);
              if (page.length < 500) break;
              last = page[page.length - 1];
            }
            if (!complete) { console.log("::warning::incomplete tag listing; skipping prune to avoid deleting a kept manifest"); return; }
            console.log("Found " + tags.length + " tags");
            if (tags.length <= KEEP_N + 1) { console.log("Below threshold; nothing to prune."); return; }

            // Fetch manifest digest + creation time per tag, concurrency-bounded
            async function info(tag) {
              const r = await fetch(base + "/manifests/" + tag, { headers: { Authorization: auth, Accept: accept } });
              if (!r.ok) return null;
              const digest = r.headers.get("docker-content-digest");
              const body = await r.json();
              let cfg = body.config?.digest;
              if (!cfg && body.manifests?.length) {
                const r2 = await fetch(base + "/manifests/" + body.manifests[0].digest, { headers: { Authorization: auth, Accept: accept } });
                if (r2.ok) { const b2 = await r2.json(); cfg = b2.config?.digest; }
              }
              let created = null;
              if (cfg) {
                const r3 = await fetch(base + "/blobs/" + cfg, { headers: { Authorization: auth } });
                if (r3.ok) { const c = await r3.json(); created = c.created || null; }
              }
              return { tag, digest, created };
            }
            const results = new Array(tags.length);
            let idx = 0;
            await Promise.all(Array.from({ length: 16 }, async () => {
              while (true) { const i = idx++; if (i >= tags.length) return; results[i] = await info(tags[i]); }
            }));

            const ok = results.filter(Boolean);
            // Fail closed if we could not resolve a digest for the just-deployed
            // tag. Without its digest in keepDigests, the alias-protection
            // below cannot defend it from a sibling tag that happens to share
            // the same manifest. Treat this exactly like pagination failure:
            // skip the prune entirely rather than risk destroying the rollback
            // floor we promised to protect.
            if (!ok.some(x => x.tag === deployedTag && x.digest)) {
              console.log("::warning::could not resolve digest for deployed tag " + deployedTag + "; skipping prune");
              return;
            }
            const dated = ok.filter(x => x.created).sort((a,b) => b.created.localeCompare(a.created));
            const top = dated.slice(0, KEEP_N).map(x => x.tag);
            const keepTags = new Set([...top, deployedTag]);
            // DELETE on a registry v2 manifest removes the manifest globally -
            // every tag that aliases that digest 404s afterward. If two tags
            // share a digest (identical Dockerfile + identical context across
            // deploys produces identical layers; the manual sweep found ~40%
            // of tags shared a manifest), deleting the "other" tag's digest
            // would destroy a kept tag's image too. Protect every digest that
            // ANY kept tag references, then dedupe the delete list separately.
            const keepDigests = new Set(ok.filter(x => keepTags.has(x.tag) && x.digest).map(x => x.digest));
            const seen = new Set();
            const toDel = ok.filter(x =>
              !keepTags.has(x.tag) &&
              x.digest &&
              !keepDigests.has(x.digest) &&
              !seen.has(x.digest) &&
              seen.add(x.digest));
            console.log("Keeping " + keepTags.size + " tags (" + keepDigests.size + " unique digests), deleting " + toDel.length + " manifests");
            let okN = 0, failN = 0;
            let di = 0;
            await Promise.all(Array.from({ length: 16 }, async () => {
              while (true) {
                const i = di++; if (i >= toDel.length) return;
                const r = await fetch(base + "/manifests/" + toDel[i].digest, { method: "DELETE", headers: { Authorization: auth } });
                if (r.ok || r.status === 202) okN++; else failN++;
              }
            }));
            console.log("Pruned: ok=" + okN + " fail=" + failN);
          })().catch(e => console.log("::warning::prune crashed: " + (e?.stack || e)));
          '

  # REQ-SEC-017: R2 bucket nuke workflow for encryption migration.
  #
  # Manually-dispatched, requires explicit confirmation, deletes every
  # object from every R2 bucket bound to the selected environment.
  # Use case: a one-time migration step before enabling SSE-C on a
  # bucket, because pre-SSE-C objects become unreadable once the key is
  # required.
  #
  # Safety gates (each is independently load-bearing):
  #   1. workflow_dispatch only — never auto-triggers.
  #   2. action=r2-nuke input must be selected (default is "deploy").
  #   3. r2_nuke_confirmation must be the exact string DELETE-ALL-R2-OBJECTS.
  #   4. production target requires main branch (same gate as deploy).
  #   5. environment: protects the job behind the chosen GitHub
  #      Environment's required reviewers and secret scope.
  r2-nuke:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'r2-nuke'
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    environment: ${{ github.ref == 'refs/heads/main' && (inputs.environment || 'production') || 'integration' }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Confirm r2-nuke authorization
        run: |
          if [ "${{ inputs.r2_nuke_confirmation }}" != "DELETE-ALL-R2-OBJECTS" ]; then
            echo "::error::r2_nuke_confirmation must be exactly 'DELETE-ALL-R2-OBJECTS' to authorize this destructive operation"
            echo "::error::Got: '${{ inputs.r2_nuke_confirmation }}'"
            exit 1
          fi
          echo "Authorization confirmed for environment: ${{ inputs.environment }}"

      - name: Block production r2-nuke from non-main branches
        if: github.ref != 'refs/heads/main' && inputs.environment == 'production'
        run: |
          echo "::error::production r2-nuke is only allowed from main. Got: ${{ github.ref }}"
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref }}

      - name: Discover R2 buckets bound to this environment
        id: discover
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TARGET_ENV: ${{ inputs.environment }}
        run: |
          # Parse wrangler.toml for r2_buckets entries scoped to this
          # environment. r2_buckets ships as TOML arrays of inline
          # tables: [[r2_buckets]] / [[env.integration.r2_buckets]].
          # Use a tiny node parser so we avoid a dependency on yq/toml.
          node -e '
            const fs = require("fs");
            const src = fs.readFileSync("wrangler.toml", "utf8");
            const env = process.env.TARGET_ENV;
            // Match [[r2_buckets]] (root) AND [[env.<env>.r2_buckets]].
            // We do not parse full TOML — just the bucket_name fields
            // inside each [[...r2_buckets]] table block.
            const rootRe = /\[\[r2_buckets\]\]([\s\S]*?)(?=\n\[|$)/g;
            const envRe = new RegExp("\\[\\[env\\." + env + "\\.r2_buckets\\]\\]([\\s\\S]*?)(?=\\n\\[|$)", "g");
            const buckets = new Set();
            for (const re of [rootRe, envRe]) {
              let m;
              while ((m = re.exec(src)) !== null) {
                const name = m[1].match(/bucket_name\s*=\s*"([^"]+)"/);
                if (name) buckets.add(name[1]);
              }
            }
            const list = [...buckets];
            console.log("Discovered R2 buckets:", list.join(", "));
            fs.writeFileSync(process.env.GITHUB_OUTPUT, "buckets=" + JSON.stringify(list) + "\n", { flag: "a" });
          '

      - name: Nuke every object in every discovered bucket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BUCKETS_JSON: ${{ steps.discover.outputs.buckets }}
        run: |
          # Inline node — no helper scripts (forkable-repo rule).
          # For each bucket: re-list from the start every iteration and
          # delete every key on the page. We do NOT walk the cursor
          # forward across DELETEs because R2's cursor-after-mutation
          # semantics aren't documented as stable; re-listing from the
          # head ensures no keys are skipped even on buckets with
          # >1000 objects. Per-key DELETE failures are logged with the
          # offending key + HTTP status so the operator can re-run
          # targeted deletes; the job exits non-zero if anything failed.
          node -e '
            const token = process.env.CLOUDFLARE_API_TOKEN;
            const account = process.env.CLOUDFLARE_ACCOUNT_ID;
            const buckets = JSON.parse(process.env.BUCKETS_JSON);
            if (!Array.isArray(buckets) || buckets.length === 0) {
              console.log("No R2 buckets discovered for this environment — nothing to nuke.");
              process.exit(0);
            }
            (async () => {
              let grandFailures = 0;
              for (const bucket of buckets) {
                console.log("=== Nuking bucket: " + bucket + " ===");
                let total = 0, failures = 0, sweepIter = 0;
                // Progress detector: under R2 list staleness a recently
                // deleted key may reappear on the next list. If we make
                // multiple sweeps in a row with zero new successful
                // deletes, the list is not converging — fail fast
                // instead of burning the 100-sweep cap.
                let consecutiveZeroProgressSweeps = 0;
                const ZERO_PROGRESS_LIMIT = 3;
                while (true) {
                  sweepIter++;
                  const url = new URL("https://api.cloudflare.com/client/v4/accounts/" + account + "/r2/buckets/" + bucket + "/objects");
                  url.searchParams.set("per_page", "1000");
                  const lr = await fetch(url, { headers: { Authorization: "Bearer " + token } });
                  if (!lr.ok) {
                    console.log("::error::list failed for " + bucket + ": HTTP " + lr.status);
                    process.exit(1);
                  }
                  const body = await lr.json();
                  // Cloudflare v4 R2 list returns { result: [...], result_info: {...} },
                  // but harden against either result-as-array or
                  // result.objects shape so a future envelope change
                  // does not silently break the loop.
                  const result = body.result;
                  const objects = (Array.isArray(result) ? result : (result && result.objects) || body.objects || [])
                    .map(o => o.key || o.name).filter(Boolean);
                  if (objects.length === 0) break;
                  console.log("Sweep " + sweepIter + ": deleting " + objects.length + " keys");
                  let sweepProgress = 0;
                  for (const key of objects) {
                    const dr = await fetch("https://api.cloudflare.com/client/v4/accounts/" + account + "/r2/buckets/" + bucket + "/objects/" + encodeURIComponent(key), {
                      method: "DELETE",
                      headers: { Authorization: "Bearer " + token },
                    });
                    // 404 means "already gone" — under R2 list staleness
                    // a re-issued DELETE for a key the previous sweep
                    // removed is benign success, not failure.
                    if (dr.ok || dr.status === 404) {
                      total++;
                      if (dr.ok) sweepProgress++;
                    } else {
                      failures++;
                      let detail = "";
                      try { detail = " body=" + (await dr.text()).slice(0, 200); } catch {}
                      console.log("::warning::DELETE failed bucket=" + bucket + " key=" + key + " status=" + dr.status + detail);
                    }
                  }
                  if (sweepProgress === 0) {
                    consecutiveZeroProgressSweeps++;
                    if (consecutiveZeroProgressSweeps >= ZERO_PROGRESS_LIMIT) {
                      console.log("::error::" + ZERO_PROGRESS_LIMIT + " consecutive sweeps with zero successful deletes for bucket " + bucket + " (list not converging — concurrent writer or stale list)");
                      process.exit(1);
                    }
                  } else {
                    consecutiveZeroProgressSweeps = 0;
                  }
                  // Hard cap on total sweeps as a final safety net.
                  if (sweepIter >= 100) {
                    console.log("::error::aborting at 100-sweep safety cap for bucket " + bucket);
                    process.exit(1);
                  }
                }
                console.log("Bucket " + bucket + ": deleted=" + total + " failed=" + failures + " sweeps=" + sweepIter);
                grandFailures += failures;
              }
              if (grandFailures > 0) {
                console.log("::error::" + grandFailures + " object DELETEs failed across all buckets");
                process.exit(1);
              }
              console.log("All discovered buckets are empty.");
            })().catch(e => { console.error(e); process.exit(1); });
          '
