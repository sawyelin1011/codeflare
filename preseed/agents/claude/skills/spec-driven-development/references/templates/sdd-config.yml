# SDD configuration — controls how spec-reviewer and doc-updater agents behave on this project.
# This file is read by both agents at the start of every run.

# Mode: interactive | auto | unleashed
#
# interactive: confirm every fix before applying. Safe for new SDD users.
# auto:        apply SAFE+RISKY fixes silently on the current branch.
#              Escalate JUDGMENT calls to sdd/spec/.review-queue.md.
# unleashed:   apply everything (including JUDGMENT) on the current branch.
#              Conservative defaults preserve information without overwriting intent.
#              Walk-away autopilot — come back to per-category commits, git revert
#              any unwanted change. No PR, no branch creation.
mode: interactive

# enforce_tdd: gates the TEST-anchor check ONLY (CQ-TEST in spec-enforce-truth):
#   - When true: Downgrades Implemented REQs without test coverage to Partial.
#     Flags Planned/Partial REQs with source code but no test (HIGH finding).
#     Runs test quality heuristics (AC count vs test count, tautology
#     detection, skipped-test detection) against every test file.
#   - When false: CQ-TEST writes informational coverage gaps to sdd/spec/.review-queue.md
#     under "## Coverage gaps" but never mutates Status.
#
# CQ-SOURCE (source-anchor truth-check) is NEVER gated by this flag — it runs
# ALWAYS, regardless of mode or transition state. Fabrication is never optional.
#
# Unleashed mode refuses to run when this is false (preserves the per-project
# opt-out). User flips to true manually when ready, or uses auto mode instead.
# Default true — TDD is the contract; opt out per project if needed.
enforce_tdd: true

# transition: set automatically by /sdd init Import Mode and cleared
# automatically when the sdd/spec/.init-triage.md queue drains.
# Do NOT set this by hand - it is managed by the /sdd init lifecycle.
# While transition: true is set:
#   - PR-boundary review pipeline is entirely suspended for spec/doc-side
#     agents (no spec-reviewer or doc-updater fires on push or PR).
#     code-reviewer still runs because the Truth guarantee (CQ-SOURCE) runs
#     during transition.
#   - /sdd mode unleashed is rejected
# On queue drain, transition: true clears. enforce_tdd is NOT auto-flipped -
# the user changes it manually when ready for TDD enforcement.
# transition: false

# Test discovery globs — where spec-reviewer looks for REQ ID references in test files.
# Detection is binary: the REQ ID literally appears in a test file or it doesn't.
test_globs:
  - "tests/**/*.test.{ts,js,tsx,jsx,mjs}"
  - "tests/**/*.spec.{ts,js,tsx,jsx,mjs}"
  - "__tests__/**/*"
  - "test/**/*.test.{ts,js,tsx,jsx,mjs}"
  - "**/*_test.{py,go,rb}"
  - "**/test_*.py"
  - "tests/e2e/**"
  - "cypress/**"
  - "playwright/**"
  - "e2e/**"

# Forbidden content allowlist — which categories are acceptable inside REQs.
# When false, the category is banned and any AC/Intent mentioning it is
# flagged HIGH `forbidden-content-in-req`; the content moves to
# documentation/. When true, the category is allowed.
#
# These five flags are set by the agent at /sdd init time based on the
# spec-flavour prompt:
#   - Technical (default for engineering teams): all five flags = true.
#   - Business / behavioural (stakeholders read REQs): protocols, vendors,
#     http_codes_in_api_reqs, performance_numbers = false; user_facing_strings
#     stays true (quoted UI strings ARE the assertion target).
#   - Custom: each flag set individually at init.
#
# To flip the flavour mid-project, hand-edit the five flags below and run
# `/sdd clean` to re-walk the spec under the new rules.
forbidden_content_allowlist:
  protocols: {{ALLOWLIST_PROTOCOLS}}        # OAuth, JWT, WebSocket, etc.
  vendors: {{ALLOWLIST_VENDORS}}          # Cloudflare Access, Stripe, Resend, etc.
  http_codes_in_api_reqs: {{ALLOWLIST_HTTP_CODES}}  # HTTP status codes when documenting an API contract REQ
  performance_numbers: {{ALLOWLIST_PERFORMANCE}}  # "p95 < 200ms", "LCP < 2.5s"
  user_facing_strings: {{ALLOWLIST_USER_FACING}}  # quoted text the user actually sees

# Per-REQ overrides — REQ IDs that opt out of forbidden-content checks entirely
forbidden_content_overrides: []

# REQ length thresholds (in lines) — soft warnings only, never auto-fix
req_length:
  warn: 25
  medium: 50
  high: 100
