# Codeflare - Browser-based cloud IDE on Cloudflare
name = "codeflare"
# workers.dev is enabled on every deployment: the setup wizard bootstraps on the
# <worker>.<account>.workers.dev URL before any custom domain exists, so a fresh
# deploy (a new account / enterprise tenant) is unreachable without it — setup is
# impossible. The wizard then adds a custom domain (codeflare.ch, etc.) which
# fronts traffic afterward; in CF Access mode, gate the workers.dev URL behind
# Access in the Cloudflare dashboard.
workers_dev = true
main = "src/index.ts"
compatibility_date = "2026-02-05"
# ctx.exports + container outbound-HTTPS interception (interceptOutboundHttps),
# used for enterprise LLM routing (REQ-ENTERPRISE-004; see container/index.ts
# setupEnterpriseInterception + src/llm-interceptor.ts), are ON by default at
# this compatibility_date — the enable_ctx_exports flag became the default on
# 2025-11-17, and specifying a now-default flag is a hard workerd config error
# (it crashes the vitest-pool-workers runtime). So no extra flag is needed.
compatibility_flags = ["nodejs_compat"]

# Enable container logs in Cloudflare dashboard
[observability]
enabled = true

# Environment variables
[vars]
ONBOARDING_LANDING_PAGE = "inactive"
# Allowed CORS origins (comma-separated domain patterns)
# Additional origins are managed dynamically via KV (setup:custom_domain, setup:allowed_origins)
ALLOWED_ORIGINS = ".workers.dev"
LOG_LEVEL = "info"
MAX_SESSIONS_USER = "3"
MAX_SESSIONS_ADMIN = "10"
# SaaS mode: custom login page, auto-provisioning, admin approval gate
# Set to "active" via GitHub Actions variable to enable
# SAAS_MODE = "inactive"
# Extra IdP UUIDs for custom OIDC providers on login page (comma-separated)
# Set via GitHub Actions variable; only relevant when SAAS_MODE = "active"
# SAAS_EXTRA_IDPS = ""
# Enterprise mode: deployed inside a customer's Cloudflare account; all users
# become unlimited + advanced, agent set restricted, and LLM traffic is routed
# to the customer's AI Gateway via platform outbound-HTTPS interception (the
# LlmInterceptor WorkerEntrypoint). isEnterpriseMode() checks === "active".
# Set to "active" via GitHub Actions variable to enable (paired with the
# AIG_GATEWAY_URL / AIG_TOKEN secrets). Left off by default — like SAAS_MODE.
# ENTERPRISE_MODE = "active"

# KV namespace for session metadata
# The id "placeholder" is for local dev/tests (vitest-pool-workers creates in-memory KV).
# deploy.yml resolves the real namespace ID at deploy time via wrangler kv namespace commands.
[[kv_namespaces]]
binding = "KV"
id = "placeholder"

# Container configuration (default tier)
# Default: 1 vCPU, 3 GiB memory, 6 GB disk
# Cloudflare containers cap disk at 2x memory in GiB - with 3 GiB memory the
# maximum is 6 GB. Bumping to 8 GB fails deploy with VALIDATE_INPUT. To raise
# disk to 8 GB, memory must go to >=4 GiB first (requires cost review).
# GitHub Actions deploy can override this via repo variable RESSOURCE_TIER.
# Required baseline for node-pty + agent CLIs + npm operations.
# RESSOURCE_TIER spelling is intentional (French/German "ressource"); preserved
# for backward compatibility across deployed instances. Do not "fix".
[[containers]]
class_name = "container"
image = "./Dockerfile"
# Default for local dev. deploy.yml patches per RESSOURCE_TIER at deploy time.
max_instances = 10

[containers.instance_type]
vcpu = 1
memory_mib = 3072
disk_mb = 6000

# Durable Objects binding for the container
[[durable_objects.bindings]]
name = "CONTAINER"
class_name = "container"

# Durable Objects binding for per-user usage tracking
[[durable_objects.bindings]]
name = "TIMEKEEPER"
class_name = "timekeeper"

# Migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["container"]

[[migrations]]
tag = "v2"
new_classes = ["timekeeper"]

# Static assets (frontend) with SPA routing
[assets]
directory = "./web-ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Ensure control-plane routes pass through Worker logic first.
# - "/" is needed for mode-aware redirect/landing logic
# - "/api/*" and "/health" must never be swallowed by SPA asset fallback
# - "/landing/*" routes the prerendered landing documents (REQ-LANDING-001)
#   through the Worker so they carry the same security headers as "/"
# - "/login" must run the Worker so onboarding mode can rewrite it to the
#   landing-built login page (REQ-AUTH-020 AC1); without it Cloudflare serves the
#   SPA asset at the edge and the rewrite never executes.
run_worker_first = ["/", "/login", "/login/", "/auth/*", "/api/*", "/public/*", "/health", "/landing/*"]
